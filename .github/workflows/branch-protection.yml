name: Branch Protection

on:
  push:
    branches: [main]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push came from PR merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the commit SHA
          COMMIT_SHA="${{ github.sha }}"

          # Check if this commit is associated with a merged PR
          PR_NUMBER=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "❌ ERROR: Direct push to main detected!"
            echo ""
            echo "This repository requires all changes to go through pull requests."
            echo "Please:"
            echo "  1. Revert this commit: git revert $COMMIT_SHA"
            echo "  2. Create a new branch: git checkout -b your-feature-branch"
            echo "  3. Make your changes and push to the branch"
            echo "  4. Create a pull request for review"
            echo ""
            exit 1
          fi

          echo "✅ Commit came from PR #$PR_NUMBER - all good!"
