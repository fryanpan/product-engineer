name = "product-engineer"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Orchestrator — always-on, Slack Socket Mode, event routing
[[containers]]
class_name = "Orchestrator"
image = "../containers/orchestrator/Dockerfile"
instance_type = "lite"
max_instances = 1

# Per-ticket agents — one per active ticket, runs Claude Agent SDK
[[containers]]
class_name = "TicketAgent"
image = "../agent/Dockerfile"
instance_type = "basic"
max_instances = 20

# Per-product project agents — persistent, accumulate context over time
[[containers]]
class_name = "ProjectAgent"
image = "../agent/Dockerfile"
instance_type = "basic"
max_instances = 10

[durable_objects]
bindings = [
  { name = "ORCHESTRATOR", class_name = "Orchestrator" },
  { name = "TICKET_AGENT", class_name = "TicketAgent" },
  { name = "PROJECT_AGENT", class_name = "ProjectAgent" }
]

[[r2_buckets]]
binding = "TRANSCRIPTS"
bucket_name = "product-engineer-transcripts"

[[kv_namespaces]]
binding = "SESSIONS"
id = "5b4f4cc3f3b342c59eead588a5446ca8"
# Production: create with `wrangler kv namespace create SESSIONS`
# Then update this ID with the actual namespace ID

[vars]
# WORKER_URL must be set via `wrangler secret put WORKER_URL` before deploying.
# Value: the deployed Worker URL (e.g., "https://product-engineer.your-subdomain.workers.dev")
# The orchestrator container uses this to forward Slack events back to the Worker.

[[migrations]]
tag = "v1"
new_classes = ["Sandbox"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Orchestrator", "TicketAgent"]
deleted_classes = ["Sandbox"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ProjectAgent"]

# ── Staging environment ──────────────────────────────────────────────
# Deploy with: wrangler deploy --env staging
[env.staging]
name = "product-engineer-stg"

[[env.staging.r2_buckets]]
binding = "TRANSCRIPTS"
bucket_name = "product-engineer-staging-transcripts"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "52c44a6e0d144e53a51c9cb4e9bcbbe0"

[env.staging.durable_objects]
bindings = [
  { name = "ORCHESTRATOR", class_name = "Orchestrator" },
  { name = "TICKET_AGENT", class_name = "TicketAgent" },
  { name = "PROJECT_AGENT", class_name = "ProjectAgent" }
]

# Orchestrator — always-on, Slack Socket Mode, event routing
[[env.staging.containers]]
class_name = "Orchestrator"
image = "../containers/orchestrator/Dockerfile"
instance_type = "lite"
max_instances = 1

# Per-ticket agents — one per active ticket, runs Claude Agent SDK
[[env.staging.containers]]
class_name = "TicketAgent"
image = "../agent/Dockerfile"
instance_type = "basic"
max_instances = 5

# Per-product project agents — persistent
[[env.staging.containers]]
class_name = "ProjectAgent"
image = "../agent/Dockerfile"
instance_type = "basic"
max_instances = 3

