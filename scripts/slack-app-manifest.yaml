display_information:
  name: Product Engineer
  description: Autonomous coding agent triggered by Linear, GitHub, and Slack
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: product-engineer
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - app_mentions:read
      - channels:history
      - channels:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
