name = "product-engineer"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Orchestrator — always-on, Slack Socket Mode, event routing
[[containers]]
class_name = "Orchestrator"
image = "../containers/orchestrator/Dockerfile"
instance_type = "lite"
max_instances = 1

[durable_objects]
bindings = [
  { name = "ORCHESTRATOR", class_name = "Orchestrator" },
  # TicketAgent lives in its own worker for zero-downtime deploys
  { name = "TICKET_AGENT", class_name = "TicketAgent", script_name = "ticket-agent-worker" }
]

[[r2_buckets]]
binding = "TRANSCRIPTS"
bucket_name = "product-engineer-transcripts"

[vars]
WORKER_URL = "https://product-engineer.fryanpan.workers.dev"

# Health check cron: runs every 10 minutes to detect stuck agents
[triggers]
crons = ["*/10 * * * *"]

# v1 was the original queue-based architecture (now replaced)
[[migrations]]
tag = "v1"
new_classes = ["Sandbox"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Orchestrator", "TicketAgent"]
deleted_classes = ["Sandbox"]

